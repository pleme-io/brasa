# Cargo config for brasa — target-specific linker args for the kernel build.
#
# When cargo is invoked with --target aarch64-unknown-none (only brasa-bin
# does this), we pass our custom linker script. Non-kernel crates default
# to the host target and are unaffected.

[target.aarch64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tcrates/brasa-bin/link.ld",
    "-C", "relocation-model=static",
    "-C", "target-cpu=cortex-a72",
]

[target.aarch64-unknown-none-softfloat]
rustflags = [
    "-C", "link-arg=-Tcrates/brasa-bin/link.ld",
    "-C", "relocation-model=static",
    "-C", "target-cpu=cortex-a72",
]
