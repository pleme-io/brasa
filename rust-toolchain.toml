# brasa targets stable Rust 1.89+. Everything we need for the kernel —
# global_asm!, #![no_main], core::arch::asm!, #[panic_handler], the
# #[unsafe(no_mangle)] attribute syntax — is stable on that channel.
# Nightly is not required and is actively avoided for reproducibility.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy", "rust-src"]
targets = [
  "aarch64-unknown-none",
  "aarch64-unknown-none-softfloat",
  "aarch64-apple-darwin",
  "x86_64-unknown-none",
]
profile = "minimal"
